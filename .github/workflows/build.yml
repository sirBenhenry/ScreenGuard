name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ScreenGuard-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      # Release build on version tags
      - name: Build Release APK
        if: startsWith(github.ref, 'refs/tags/v')
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          mv app/build/outputs/apk/release/app-release-unsigned.apk \
             app/build/outputs/apk/release/ScreenGuard-${VERSION}.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/ScreenGuard-*.apk
          generate_release_notes: true
          body: |
            ## Install
            1. Download the APK below
            2. Allow "Install unknown apps" for your file manager
            3. Tap the APK to install

            ## Permissions required on first launch
            - Usage Stats Access → grant in Settings
            - Draw Over Other Apps → grant in Settings
            - Accessibility Service → enable ScreenGuard in Settings → Accessibility
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
